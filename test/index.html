    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function () {
            Orchestrator.PageRegistration(PageIndex, { index: 1 }, { mode: 1 });
            Orchestrator.PageComponentRegistration(PageIndexComponent1, { options: { } });
            Orchestrator.PageComponentRegistration(PageIndexComponent2);

            console.log("Get render value")
            console.log(Orchestrator.GetOrchestratorInstanceValue("render"))
        })

        function TestRenderChange(){
            Orchestrator.PageRender(Orchestrator.OrchestratorViewMode.Create)
        }
        function TestCallGetCustomComponent1(){
            Orchestrator.CallMethod(PageIndexComponent1, "ComponentCustomMethodGet")
        }
        function TestCallSetCustomComponent1(){
            Orchestrator.CallMethod(PageIndexComponent1, "ComponentCustomMethodSet")
        }
        function TestCallCustomComponent2(){

        }
